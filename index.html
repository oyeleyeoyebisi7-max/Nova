<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b1120;
height:100vh;
overflow:hidden;
color:white;
}

.app{
display:flex;
height:100vh;
width:100%;
}

.sidebar{
width:260px;
background:#111827;
border-right:1px solid rgba(255,255,255,0.06);
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
font-size:26px;
font-weight:700;
}

.logo span{
color:#3b82f6;
}

.sidebar-card{
background:#1f2937;
padding:18px;
border-radius:18px;
line-height:1.7;
color:#cbd5e1;
font-size:14px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
padding:20px 30px;
border-bottom:1px solid rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
}

.topbar h1{
font-size:22px;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:22px;
scroll-behavior:smooth;
}

.message{
max-width:80%;
padding:18px 20px;
line-height:1.8;
border-radius:22px;
animation:fadeIn .25s ease;
word-wrap:break-word;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#2563eb,#3b82f6);
box-shadow:0 10px 30px rgba(37,99,235,0.25);
}

.bot{
align-self:flex-start;
background:#1e293b;
border:1px solid rgba(255,255,255,0.05);
}

.input-area{
padding:20px;
display:flex;
gap:15px;
background:#0f172a;
border-top:1px solid rgba(255,255,255,0.06);
}

textarea{
flex:1;
height:65px;
resize:none;
border:none;
outline:none;
background:#1e293b;
border-radius:18px;
padding:18px;
color:white;
font-size:15px;
}

button{
width:130px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.typing{
display:flex;
gap:6px;
align-items:center;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#94a3b8;
animation:bounce 1s infinite;
}

.dot:nth-child(2){
animation-delay:.15s;
}

.dot:nth-child(3){
animation-delay:.3s;
}

@keyframes bounce{
0%,80%,100%{
transform:scale(.7);
opacity:.5;
}
40%{
transform:scale(1);
opacity:1;
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(6px);
}

to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:900px){

.sidebar{
display:none;
}

.message{
max-width:92%;
}

.chat-box{
padding:20px;
}

button{
width:100px;
}

}

</style>
</head>
<body>

<div class="app">

<div class="sidebar">

<div class="logo">
Nova <span>AI</span>
</div>

<div class="sidebar-card">
Build smarter with AI-powered conversations.
<br><br>
Designed and deployed by a no-code developer & designer.
</div>

<div class="sidebar-card">
⚡ Real-time AI responses
<br><br>
🌍 Deployed live online
<br><br>
🧠 OpenRouter API integration
</div>

</div>

<div class="main">

<div class="topbar">
<h1>Nova AI Assistant</h1>
</div>

<div class="chat-box" id="chat-box">

<div class="message bot">
👋 Welcome to Nova AI.

How can I help you today?
</div>

</div>

<div class="input-area">
<textarea id="user-input" placeholder="Ask Nova AI anything..."></textarea>
<button id="send-btn">Send</button>
</div>

</div>

</div>

<script>

const chatBox = document.getElementById("chat-box");
const sendBtn = document.getElementById("send-btn");
const userInput = document.getElementById("user-input");

function addMessage(content,sender){

const div = document.createElement("div");

div.classList.add("message",sender);

if(sender === "typing"){

  div.classList.add("bot");

  div.innerHTML = `
  <div class="typing">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  `;

}else{
  div.innerText = content;
}

chatBox.appendChild(div);

chatBox.scrollTop = chatBox.scrollHeight;

return div;
}

async function sendMessage(){

const text = userInput.value.trim();

if(!text) return;

addMessage(text,"user");

userInput.value = "";

const typing = addMessage("","typing");

try{

const response = await fetch("/.netlify/functions/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data = await response.json();

typing.remove();

addMessage(data.reply || "No response","bot");

}catch(error){

typing.remove();

addMessage("Something went wrong.","bot");

console.log(error);
}
}

sendBtn.addEventListener("click",sendMessage);

userInput.addEventListener("keydown",(e)=>{
if(e.key === "Enter" && !e.shiftKey){
e.preventDefault();
sendMessage();
}
});

</script>

</body>
</html>
