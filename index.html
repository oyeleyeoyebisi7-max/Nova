<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
height:90vh;
background:#111827;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
border:1px solid rgba(255,255,255,0.1);
}

.topbar{
padding:20px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.topbar h1{
font-size:28px;
}

.topbar p{
color:#9ca3af;
margin-top:5px;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.message{
padding:14px 18px;
border-radius:18px;
max-width:80%;
line-height:1.6;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.bot{
background:#1f2937;
align-self:flex-start;
}

.input-area{
padding:20px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

textarea{
flex:1;
height:60px;
border:none;
outline:none;
resize:none;
border-radius:14px;
padding:15px;
background:#1e293b;
color:white;
}

button{
width:120px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>
<body>

<div class="container">

<div class="topbar">
<h1>Nova AI</h1>
<p>Professional AI Assistant</p>
</div>

<div class="chat-box" id="chat-box">

<div class="message bot">
Hello 👋<br><br>
I'm Nova AI. Ask me anything.
</div>

</div>

<div class="input-area">
<textarea id="user-input" placeholder="Ask something..."></textarea>
<button id="send-btn">Send</button>
</div>

</div>

<script>

const chatBox = document.getElementById("chat-box");
const sendBtn = document.getElementById("send-btn");
const userInput = document.getElementById("user-input");

function addMessage(text,sender){

const div = document.createElement("div");

div.classList.add("message",sender);

div.innerHTML = text;

chatBox.appendChild(div);

chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

const text = userInput.value.trim();

if(!text) return;

addMessage(text,"user");

userInput.value = "";

addMessage("Thinking...","bot");

try{

const response = await fetch("/.netlify/functions/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data = await response.json();

document.querySelector(".chat-box .bot:last-child").remove();

addMessage(data.reply || "No response","bot");

}catch(error){

document.querySelector(".chat-box .bot:last-child").remove();

addMessage("Error connecting to AI.","bot");

console.log(error);
}
}

sendBtn.addEventListener("click",sendMessage);

userInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMessage();
}
});

</script>

</body>
  </html>
